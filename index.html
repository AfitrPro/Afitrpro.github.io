<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFITR</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  background: #0b0f1a;
  color: white;
}

/* 顶部导航 */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 16px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.4);
  z-index: 999;
}

/* 左上角品牌 */
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  width: 34px;
  height: 34px;
  object-fit: contain;
}

.brand-text {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 1px;
}

/* 右侧菜单 */
.nav-links {
  display: flex;
  gap: 30px;
  align-items: center;
}

.nav-links a {
  color: rgba(255,255,255,0.7);
  text-decoration: none;
  font-size: 14px;
  transition: 0.3s;
}

.nav-links a:hover {
  color: white;
}

/* 下载按钮 */
.nav-btn {
  padding: 8px 16px;
  border-radius: 999px;
  background: white;
  color: black;
  font-weight: 600;
}

/* 首页大图 */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.hero img {
  width: 60%;
  max-width: 800px;
  opacity: 0.9;
}

/* 标题 */
.hero-text {
  position: absolute;
  bottom: 120px;
  text-align: center;
}

.hero-text h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.hero-text p {
  color: rgba(255,255,255,0.6);
}

/* 下载按钮（中间） */
.download-btn {
  margin-top: 20px;
  display: inline-block;
  padding: 14px 28px;
  border-radius: 999px;
  background: white;
  color: black;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
}

.download-btn:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<!-- 顶部 -->
<nav class="nav">
  <div class="brand">
    <img src="afitr-logo.jpg" class="logo">
    <div class="brand-text">AFITR</div>
  </div>

  <div class="nav-links">
    <a href="#">Brand</a>
    <a href="#">Products</a>
    <a href="#">Download</a>
    <a class="nav-btn" href="https://github.com/AfitrPro/Afitrpro.github.io/releases/download/1.0/GeNvAmIXwAAgW-6.jpeg" download>
      Download
    </a>
  </div>
</nav>

<!-- 主视觉 -->
<section class="hero">
  <!-- 你的IP大图 -->
  <img src="afitr-ip.jpeg">

  <div class="hero-text">
    <h1>AFITR</h1>
    <p>Next Generation Real-Time Language Intelligence</p>

    <!-- 下载 -->
    <a class="download-btn"
       href="https://github.com/AfitrPro/Afitrpro.github.io/releases/download/1.0/GeNvAmIXwAAgW-6.jpeg"
       download>
       Download Afitr-T
    </a>
  </div>
</section>

</body>
</html>
